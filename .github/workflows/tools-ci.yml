name: Tools CI

on:
  push:
    paths:
      - 'tools/**'
      - 'docs/**'
      - 'scripts/tool-registry.json'
      - '.github/workflows/tools-ci.yml'
  pull_request:
    paths:
      - 'tools/**'
      - 'docs/**'
      - 'scripts/tool-registry.json'
      - '.github/workflows/tools-ci.yml'

jobs:
  architecture-validator:
    name: Architecture Validator Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/architecture-validator
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tools/architecture-validator/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

  code-architecture-toolkit:
    name: MCP Dev Agent Server Build And Smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/code-architecture-toolkit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tools/code-architecture-toolkit/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npm run build

      - name: Smoke test MCP tools
        run: npm run smoke

  tool-reception:
    name: Tool Reception Docs And Quality Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/tool-reception
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tools/tool-reception/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate docs index coverage
        run: npm run check:docs-index

      - name: Sync catalog artifacts from docs index
        run: npm run sync:catalog

      - name: Ensure synced artifacts are committed
        working-directory: .
        run: |
          git diff --exit-code -- tools/tool-reception/tool-registry.snapshot.json tools/tool-reception/tool-metadata.json

      - name: Build tool-reception
        run: npm run build

      - name: Run smoke test
        run: npm run smoke

      - name: Run golden tests
        run: npm run test:golden
